<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>萝卜弹幕 iOS 应用下载</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7f4;
      --text: #202124;
      --muted: #62645f;
      --line: #deded8;
      --panel: #ffffff;
      --accent: #1d7f5b;
      --button-gradient: linear-gradient(180deg, #7429df 0%, #2d7df3 100%);
      --button-gradient-active: linear-gradient(180deg, #6322c8 0%, #236bd8 100%);
      --button-text: #ffffff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #151613;
        --text: #f0f1ec;
        --muted: #b8bbb1;
        --line: #30322c;
        --panel: #1d1f1a;
        --accent: #71d4a5;
        --button-gradient: linear-gradient(180deg, #8436f0 0%, #338cff 100%);
        --button-gradient-active: linear-gradient(180deg, #7430d8 0%, #287be5 100%);
        --button-text: #ffffff;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      line-height: 1.7;
    }

    main {
      width: min(720px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0 max(48px, env(safe-area-inset-bottom));
    }

    .hero {
      padding: 30px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .app-heading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 18px;
      text-align: left;
    }

    .app-logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      object-fit: cover;
      box-shadow: 0 8px 22px rgb(0 0 0 / 16%);
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 17px;
    }

    .download-button {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      margin-top: 28px;
      padding: 14px 20px;
      border-radius: 8px;
      background: var(--button-gradient);
      color: var(--button-text);
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .download-button:active {
      transform: translateY(1px);
      background: var(--button-gradient-active);
    }

    .hint {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    .features {
      margin: 28px 0 0;
      padding: 0;
      list-style: none;
    }

    .features li {
      padding: 16px 0;
      border-top: 1px solid var(--line);
      font-size: 16px;
    }

    .features strong {
      display: block;
      margin-bottom: 4px;
      color: var(--text);
      font-size: 17px;
    }

    .features span {
      color: var(--muted);
    }

    @media (max-width: 520px) {
      main {
        width: min(100% - 24px, 720px);
        padding-top: 24px;
      }

      .hero {
        padding: 22px;
      }

      h1 {
        font-size: 28px;
      }

      .app-logo {
        width: 64px;
        height: 64px;
        border-radius: 16px;
      }

      .lead {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero" aria-labelledby="app-title">
      <div class="app-heading">
        <img class="app-logo" src="logo.png" alt="" width="72" height="72">
        <h1 id="app-title">萝卜弹幕</h1>
      </div>
      <p class="lead">一款 iOS 弹幕工具，用来快速编辑弹幕文字、套用模板皮肤，并全屏展示滚动弹幕效果。</p>

      <a class="download-button" href="itms-apps://apps.apple.com/cn/app/id6780332042" data-url="itms-apps://apps.apple.com/cn/app/id6780332042">前往 App Store 下载</a>
      <p class="hint">请在 iPhone 上点击按钮打开 App Store。</p>

      <ul class="features" aria-label="应用功能">
        <li>
          <strong>快速制作弹幕</strong>
          <span>输入文字后即可预览滚动效果，适合活动现场、聚会互动和趣味展示。</span>
        </li>
        <li>
          <strong>模板和皮肤</strong>
          <span>内置多种样式，也支持调整字号、速度、字体颜色和背景颜色。</span>
        </li>
        <li>
          <strong>全屏展示</strong>
          <span>将弹幕内容以横屏或全屏方式展示，适合活动现场、聚会互动和临时提示。</span>
        </li>
      </ul>
    </section>
  </main>

</body>
</html>
